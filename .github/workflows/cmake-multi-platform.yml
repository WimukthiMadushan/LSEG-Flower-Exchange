# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'images/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - 'images/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc]
        cpp_compiler: [g++]
    steps:
      - uses: actions/checkout@v4

      # - name: Install CMake 4.1+ (Ubuntu)
      #   if: matrix.os == 'ubuntu-latest'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y wget
      #     wget https://github.com/Kitware/CMake/releases/download/v4.1.0/cmake-4.1.0-linux-x86_64.sh
      #     sudo mkdir -p /opt/cmake
      #     sudo sh cmake-4.1.0-linux-x86_64.sh --skip-license --prefix=/opt/cmake
      #     echo "/opt/cmake/bin" >> $GITHUB_PATH

      # - name: Install CMake 4.1+ (Windows)
      #   if: matrix.os == 'windows-latest'
      #   shell: pwsh
      #   run: |
      #     $ProgressPreference = 'SilentlyContinue'
      #     Invoke-WebRequest -Uri "https://github.com/Kitware/CMake/releases/download/v4.1.0/cmake-4.1.0-windows-x86_64.msi" -OutFile "$env:TEMP\cmake-4.1.0.msi"
      #     Start-Process msiexec.exe -Wait -ArgumentList '/i', "$env:TEMP\cmake-4.1.0.msi", '/quiet', '/norestart', "/log $env:TEMP\cmake-install.log"
      #     $cmakePath = "C:\Program Files\CMake\bin"
      #     echo "$cmakePath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set reusable strings
        # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}

      - name: Build
        # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: List build directory contents (debug)
        run: |
          echo "Listing build directory contents after build:"
          ls -l ${{ steps.strings.outputs.build-output-dir }}
          echo "Listing build/Release directory contents (if exists):"
          ls -l ${{ steps.strings.outputs.build-output-dir }}/Release || true

      - name: Test
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: ctest --build-config ${{ matrix.build_type }}
      - name: Run integration tests
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            python tests/integration_test/integration_test.py
          else
            python3 tests/integration_test/integration_test.py
          fi
